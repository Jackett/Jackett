---
id: torrenthr-api
name: TorrentHR (API)
description: "TorrentHR is a ratioless CROATIAN Private Torrent Tracker for 0DAY / GENERAL"
language: hr-HR
type: private
encoding: UTF-8
links:
  - https://www.torrenthr.org/

caps:
  categorymappings:
    - {id: 31, cat: TV/Anime, desc: "Anime"}
    - {id: 1, cat: PC/0day, desc: "Aplikacije"}
    - {id: 25, cat: Books, desc: "E-books"}
    - {id: 38, cat: PC/Mobile-Other, desc: "Smartphone"}
    - {id: 16, cat: TV, desc: "THR Packs"}
    - {id: 4, cat: Movies/SD, desc: "Filmovi/SD"}
    - {id: 14, cat: Movies/DVD, desc: "Filmovi/DVD"}
    - {id: 17, cat: Movies/HD, desc: "Filmovi/HD"}
    - {id: 40, cat: Movies/BluRay, desc: "Filmovi/BD"}
    - {id: 15, cat: TV/Sport, desc: "Sport"}
    - {id: 18, cat: Movies/Foreign, desc: "Crtani Filmovi"}
    - {id: 12, cat: TV/Documentary, desc: "Dokumentarni Filmovi"}
    - {id: 11, cat: Audio, desc: "Koncerti/Spotovi"}
    - {id: 3, cat: Audio/MP3, desc: "Glazba/MP3"}
    - {id: 29, cat: Audio/Lossless, desc: "Glazba/FLAC"}
    - {id: 5, cat: PC/Games, desc: "Igre/PC"}
    - {id: 27, cat: Console/PS4, desc: "Igre/PS"}
    - {id: 28, cat: Console/Wii, desc: "Igre/Wii"}
    - {id: 26, cat: Console/XBox, desc: "Igre/Xbox"}
    - {id: 13, cat: Other, desc: "Ostalo"}
    - {id: 7, cat: TV/SD, desc: "Serije/SD"}
    - {id: 34, cat: TV/HD, desc: "Serije/HD"}
    - {id: 30, cat: Books/Comics, desc: "Stripovi"}
    - {id: 10, cat: XXX, desc: "XXX/SD"}
    - {id: 36, cat: XXX, desc: "XXX/HD"}

  modes:
    search: [q]
    tv-search: [q, season, ep, imdbid, tvdbid, tmdbid]
    movie-search: [q, imdbid, tmdbid]
    music-search: [q]
    book-search: [q]

settings:
  - name: apikey
    type: text
    label: APIKey
  - name: info_key
    type: info
    label: About your API key
    default: "Find or Generate a new API Token by accessing your <a href=\"https://www.torrenthr.org/\" target=\"_blank\">TorrentHR</a> account <i>Postavke (Settings)</i> page and selecting <b>API</b> from the <i>Opće (General)</i> pulldown."
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: single_file_release_use_filename
    type: checkbox
    label: Use filename as title for single file releases
    default: true
  - name: sort
    type: select
    label: Sort requested from site
    default: created_at
    options:
      created_at: created
      seeders: seeders
      size: size
      name: title
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc

login:
  path: api/torrents
  method: get
  error:
    - selector: a[href*="/login"]
      message:
        text: "The API key was not accepted by {{ .Config.sitelink }}."
    - selector: :root:contains("Account is Banned")

search:
  paths:
    # https://hdinnovations.github.io/UNIT3D/torrent_api.html
    # https://github.com/HDInnovations/UNIT3D/blob/master/app/Http/Controllers/API/TorrentController.php#L657
    - path: api/torrents/filter
      response:
        type: json

  headers:
    Authorization: ["Bearer {{ .Config.apikey }}"]

  inputs:
  # if we have an id based search, add Season and Episode as query in name for UNIT3D < v6.  Else pass S/E Params for UNIT3D >= v6
    $raw: "{{ range .Categories }}&categories[]={{.}}{{end}}"
    name: "{{ .Keywords }}"
    seasonNumber: "{{ .Query.Season }}"
    episodeNumber: "{{ .Query.Ep }}"
    imdbId: "{{ .Query.IMDBIDShort }}"
    tmdbId: "{{ .Query.TMDBID }}"
    tvdbId: "{{ .Query.TVDBID }}"
    "free[]": "{{ if .Config.freeleech }}100{{ else }}{{ end }}"
    sortField: "{{ .Config.sort }}"
    sortDirection: "{{ .Config.type }}"
    perPage: 100

  keywordsfilters:
    - name: re_replace
      args: ["\\.", " "]

  rows:
    selector: data
    attribute: attributes

  fields:
    category:
      selector: category_id
    title_optional:
      selector: name
    title_filename:
      selector: "files[0].name"
      optional: true
    files:
      selector: num_file
    title:
      text: "{{ if and (.Config.single_file_release_use_filename) (eq .Result.files \"1\") (.Result.title_filename) }}{{ .Result.title_filename }}{{ else }}{{ .Result.title_optional }}{{ end }}"
    details:
      selector: details_link
    download:
      selector: download_link
    poster:
      selector: meta.poster
      filters:
        - name: replace
          args: ["https://via.placeholder.com/90x135", ""]
    imdbid:
      selector: imdb_id
    tmdbid:
      selector: tmdb_id
    tvdbid:
      selector: tvdb_id
    genre:
      selector: meta.genres
      filters:
        - name: re_replace
          args: ["(?i)(Akcija i avantura)", "Akcija_i_avantura"]
        - name: re_replace
          args: ["(?i)(SF i fantazija)", "SF_i_fantazija"]
        - name: replace
          args: ["(?i)(Znanstvena fantastika)", "Znanstvena_fantastika"]
        - name: replace
          args: ["(?i)(Talk show)", "Talk_show"]
        - name: replace
          args: ["(?i)(TV film)", "TV_film"]
        - name: replace
          args: ["(?i)(Rat i politika)", "Rat_i_politika"]
        - name: replace
          args: [" & ", "_&_"]
    _internal:
      selector: internal
      case:
        False: "{{ .False }}"
        True: "{{ .True }}"
    description:
      text: "{{ if .Result._internal }}Internal{{ else }}{{ end }}{{ if and .Result._internal .Result.genre }} | {{ else }}{{ end }}{{ .Result.genre }}"
    seeders:
      selector: seeders
    leechers:
      selector: leechers
    grabs:
      selector: times_completed
    date:
      # "created_at": "2021-10-18T00:34:50.000000Z" is returned by Newtonsoft.Json.Linq as 18/10/2021 00:34:50
      selector: created_at
      filters:
        - name: append
          args: " +00:00" # GMT
        - name: dateparse
          args: "MM/dd/yyyy HH:mm:ss zzz"
    size:
      selector: size
    _featured:
      selector: featured
      case:
        False: "{{ .False }}"
        True: "{{ .True }}"
    downloadvolumefactor_freeleech:
      # api returns 0%, 25%, 50%, 75%, 100%
      selector: freeleech
      case:
        0%: 1 # not free
        25%: 0.75
        50%: 0.5
        75%: 0.25
        100%: 0 # freeleech
        "*": 0 # catch errors
    downloadvolumefactor:
      text: "{{ if .Result._featured }}0{{ else }}{{ .Result.downloadvolumefactor_freeleech }}{{ end }}"
    uploadvolumefactor_double_upload:
      # api returns False, True
      selector: double_upload
      case:
        False: 1 # normal
        True: 2 # double
    uploadvolumefactor:
      text: "{{ if .Result._featured }}2{{ else }}{{ .Result.uploadvolumefactor_double_upload }}{{ end }}"
    minimumratio:
      text: 1.0
    minimumseedtime:
      # 3 days (as seconds = 3 x 24 x 60 x 60)
      text: 259200
# json TorrentHR v2.0 (based on UNIT3D 9.2.0)
