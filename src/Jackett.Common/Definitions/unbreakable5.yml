    - {id: 135, cat: TV/Documentary, desc: "DokuPacks in 2160p"}
    - {id: 155, cat: TV/Documentary, desc: "Dokus in SD"}
    - {id: 152, cat: Books, desc: "E-Books"}
    - {id: 168, cat: Movies, desc: "Animes"}
    - {id: 103, cat: Movies/BluRay, desc: "Filme von Blu-Rays"}
    - {id: 104, cat: Movies/DVD, desc: "Filme von DVD-ROMs"}
    - {id: 141, cat: Movies/HD, desc: "Filme in HD 1080p"}
    - {id: 154, cat: Movies/HD, desc: "Filme in HD 720p"}
    - {id: 166, cat: Movies/Foreign, desc: "Internationale Filme"}
