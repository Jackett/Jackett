    - {id: 106, cat: Movies/HD, desc: "Filmpakete in HD 720p"}
    - {id: 105, cat: Movies/SD, desc: "Filmpakete in SD"}
    - {id: 119, cat: Movies/UHD, desc: "Filmpakete in UHD 2160p"}
    - {id: 153, cat: Movies/SD, desc: "Filme in SD"}
    - {id: 140, cat: Movies/UHD, desc: "Filme in UHD 2160p"}
    - {id: 102, cat: Movies, desc: "Filmklassiker"}
    - {id: 127, cat: Movies, desc: "Klassiker Filmpakete"}
    - {id: 118, cat: Audio/Audiobook, desc: "Hörbücher"}
    - {id: 109, cat: Audio/Lossless, desc: "Musik im Flac Format"}
    - {id: 129, cat: Audio/MP3, desc: "Musik im MP3 Format"}
    - {id: 111, cat: Audio/Lossless, desc: "Musikpaket im Flac Format"}
    - {id: 112, cat: Audio/MP3, desc: "Musikpaket im MP3 Format"}
    - {id: 161, cat: Console/NDS, desc: "Spiele für Nintendo"}
    - {id: 162, cat: Console/PS3, desc: "Spiele für Playstation"}
    - {id: 115, cat: TV/Anime, desc: "Anime Serien"}
    - {id: 113, cat: TV/HD, desc: "Serien in HD1080p"}
    - {id: 125, cat: TV/HD, desc: "Serien in HD720p"}
    - {id: 144, cat: TV/Anime, desc: "Anime Serienpaket"}
    - {id: 138, cat: TV/HD, desc: "Serienpaket in HD 1080p"}
    - {id: 116, cat: TV/HD, desc: "Serienpaket in HD 720p"}
    - {id: 137, cat: TV/SD, desc: "Serienpaket in SD"}
    - {id: 143, cat: TV/UHD, desc: "Serienpaket in UHD 2160p"}
    - {id: 133, cat: TV/SD, desc: "Serien in SD"}
    - {id: 114, cat: TV/UHD, desc: "Serien in UHD 2160p"}
    - {id: 169, cat: TV/Sport, desc: "Sport"}
    - {id: 150, cat: PC, desc: "Windows Apps"}
    - {id: 149, cat: PC/Games, desc: "Windows Games"}
    - {id: 69, cat: XXX, desc: "XXX"}
    - {id: 151, cat: Books/Mags, desc: "Zeitschriften"}

  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]
    music-search: [q]
    book-search: [q]
  allowrawsearch: true

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password
  - name: pin
    type: text
    label: Pin
  - name: freeleech
    type: checkbox
    label: Filter freeleech only
    default: false
  - name: sort
    type: select
    label: Sort requested from site
    default: added
    options:
      added: created
      seeds: seeders
      size: size
      name: title
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc

login:
  method: form
  path: login.php
  submitpath: takelogin.php
  inputs:
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
    secure_pin: "{{ .Config.pin }}"
  test:
    path: index.php
    selector: "a[href*=\"logout.php\"]"
  error:
    - selector: a[href="login.php"]

search:
  paths:
    - path: browse.php
  inputs:
    $raw: "{{ range .Categories }}c{{.}}=1&{{end}}"
    search: "{{ .Keywords }}"
    # 0 name, 1 descr, 2 both
    showsearch: 1
    orderby: "{{ .Config.sort }}"
    sort: "{{ .Config.type }}"

  rows:
    selector: "table.tableinborder > colgroup + tbody > tr:has(a[href*=\"details.php?id=\"]){{ if .Config.freeleech }}:has(img[src=\"pic/oupic.gif\"]) {{ else }}{{ end }}"

  fields:
    title:
      selector: a[href*="details.php?id="] > b
    details:
      selector: a[href*="details.php?id="]
      attribute: href
    size:
      selector: td:contains("B") > b:first-child
    files:
      selector: td:contains("B") > b:nth-of-type(2)
    seeders:
      selector: td:nth-of-type(2) > table > tbody > tr:nth-of-type(2) > td:nth-of-type(2) > b:first-of-type > font
    leechers:
      selector: td:nth-of-type(2) > table > tbody > tr:nth-of-type(2) > td:nth-of-type(2) > b:last-of-type > font
    grabs:
      selector: td:nth-of-type(2) > table > tbody > tr:nth-of-type(2) > td:nth-of-type(3) > b
    minimumratio:
      text: 1.0
    category:
      selector: a[href*="browse.php?cat="]
      attribute: href
      filters:
        - name: replace
          args: ["browse.php?cat=", ""]
    download:
      selector: a[href*="download.php"]
      attribute: href
    date_year:
      selector: td:nth-of-type(2) > table > tbody > tr:nth-of-type(2) > td:last-of-type
      filters:
        - name: dateparse
          args: "dd.MM.yyyy HH:mm:ss"
    date:
      text: "{{ if .Result.date_year }}{{ .Result.date_year }}{{ else }}now{{ end }}"
