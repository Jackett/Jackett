  modes:
    search: [q]
    tv-search: [q, season, ep, imdbid, tmdbid]
    movie-search: [q, imdbid, tmdbid]
    music-search: [q]
    book-search: [q]
  allowtvsearchimdb: true

settings:
  - name: cookie
    type: text
    label: Cookie
  - name: info_cookie
    type: info_cookie
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: info_activity
    type: info
    label: Account Inactivity
    default: "All members are required to log into their account at least every 89 days or you will be deleted without warning."

login:
  # using cookie method because login page has embedded Cloudflare turnstile
  method: cookie
  inputs:
    cookie: "{{ .Config.cookie }}"
  test:
    path: t
    selector: a[href="/logout.php"]

search:
  paths:
    # https://torrenting.com/t?1=&5=&free=on&q=climax&qf=ti
    - path: t
  inputs:
    $raw: "{{ range .Categories }}{{.}}=&{{end}}"
    q: "{{ if .Query.IMDBID }}{{ .Query.IMDBID }} {{ else }}{{ end }}{{ if .Query.TMDBID }}{{ .Query.TMDBID }} {{ else }}{{ end }}{{ .Keywords }}"
    qf: "{{ if or .Query.IMDBID .Query.TMDBID }}adv{{ else }}ti{{ end }}"
    free: "{{ if .Config.freeleech }}on{{ else }}{{ end }}"

  rows:
    selector: table.t1 > tbody > tr

  fields:
    # category layout may differ per user
    categorydesc_alt:
      selector: a[href^="?"] img
      attribute: alt
      optional: true
    categorydesc:
      selector: td.i.p
      optional: true
      default: "{{ .Result.categorydesc_alt }}"
    title:
      selector: a[href^="/t/"]
    details:
      selector: a[href^="/t/"]
      attribute: href
    download:
      selector: a[href^="/download.php/"]
      attribute: href
    genre:
      selector: td.al div.sub
      filters:
        - name: re_replace
          args: ["(?i)(Science Fiction)", "Science_Fiction"]
        - name: validate
          args: "Action, Adventure, Animation, Biography, Comedy, Crime, Documentary, Drama, Family, Fantasy, Game-Show, History, Horror, Music, Musical, Mystery, News, Reality-TV, Romance, Science_Fiction, Sci-Fi, Short, Sitcom, Sport, Talk-Show, Thriller, War, Western"
    date:
      selector: td.al div.sub
      filters:
        - name: re_replace
          args: [".+?\\|", ""]
        - name: timeago
    seeders:
      selector: td:nth-last-child(2)
    leechers:
      selector: td:nth-last-child(1)
    size:
      selector: td:nth-last-child(3)
    downloadvolumefactor:
      case:
        "span:contains(\"FreeLeech\")": 0
        "*": 1
    uploadvolumefactor:
      text: 1
    minimumratio:
      text: 1
    minimumseedtime:
      # 3 days (as seconds = 3 x 24 x 60 x 60)
      text: 259200
# engine n/a
