  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]
    music-search: [q]
    book-search: [q]

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password
  - name: pin
    type: text
    label: Pin
  - name: freeleech
    type: checkbox
    label: Search FreeLeech
    default: false
  - name: onlyupload
    type: checkbox
    label: Search OnlyUpload
    default: false
  - name: info_free
    type: info
    label: About Freeleech and OnlyUpload at World-of-Tomorrow
    default: "<ul><li>FreeLeech are torrents where neither the download or upload is counted. (On the Jackett dashboard search results these are tagged as NoUpload).</li><li>OnlyUpload are torrents where download is not counted but upload is. Good for building your Ratio up. (On the Jackett dashboard search results these are tagged as Freeleech).</li></ul>"
  - name: sortby
    type: select
    label: Sort requested from site
    default: added
    options:
      added: created
      seeders: seeders
      size: size
      name: title
  - name: typeby
    type: select
    label: Order requested from site
    default: DESC
    options:
      DESC: desc
      ASC: asc
  - name: info_activity
    type: info
    label: Account Inactivity
    default: "All accounts up to platinum users that are inactive for more than 8 weeks will be deleted!"

login:
  path: takelogin.php
  method: post
  inputs:
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
    pin: "{{ .Config.pin }}"
    remember: 1
  error:
    - selector: div#loginStatus
  test:
    path: index.php
    selector: a[href="logout.php"], title:contains("APRILSCHERZ")

search:
  paths:
    # POST https://w-o-t.pro/search_query.php
    # name=&categories[]=1107&maxAge=added&sortBy=added&sortByType=DESC&myTorrents=no&highlight=no&onlyupload=no&freeleech=no&offset=0&limit=10
    - path: search_query.php
      method: post

  inputs:
    name: "{{ .Keywords }}"
    $raw: "{{ range .Categories }}&categories[]={{.}}{{end}}"
    searchMethod: wildcard
    maxAge: added
    sortBy: "{{ .Config.sortby }}"
    sortByType: "{{ .Config.typeby }}"
    myTorrents: no
    highlight: no
    onlyupload: "{{ if .Config.onlyupload }}yes{{ else }}no{{ end }}"
    freeleech: "{{ if .Config.freeleech }}yes{{ else }}no{{ end }}"
    offset: 0
    limit: 100

  rows:
    selector: div.sr-card

  fields:
    categorydesc:
      selector: div.sr-badge-cat
      remove: span.sr-badge-lang
    title:
      selector: div.sr-title-row a[href^="torrent.php"]
    details:
      selector: div.sr-title-row a[href^="torrent.php"]
      attribute: href
    download:
      selector: a[href^="download.php?torrent="]
      attribute: href
    poster:
      selector: div.sr-cover img
      attribute: src
    imdbid:
      selector: a.sr-link-badge[href*="imdb.com"]
      attribute: href
    size:
      selector: span.sr-detail-size
    grabs:
      selector: span.sr-detail-dl
    seeders:
      selector: span.sr-detail-seed
    leechers:
      selector: span.sr-detail-leech
    date:
      selector: span.sr-detail-time i
      attribute: title
      filters:
        - name: append
          args: " +01:00"
        - name: dateparse
          args: "yyyy-MM-dd HH:mm:ss zzz"
    downloadvolumefactor:
      case:
        span.sr-status-onlyupload: 0 # only upload is counted
        "*": 1
    uploadvolumefactor:
      case:
        span.sr-status-freeleech: 0 # nothing is counted
        "*": 1
    minimumratio:
      text: 0.7
    minimumseedtime:
      # 3 days (as seconds = 3 x 24 x 60 x 60)
      text: 259200
