---
id: u2p
name: U2P
description: "U2P is a FRENCH Public Torrent Tracker for MOVIES / TV / GENERAL"
# For now, all their content is based on yggtorrent, but it'll be populated more later
# so some caps features may start working after they begin adding their own content
language: fr-FR
type: public
encoding: UTF-8
links:
  - https://ygg.gratis/

caps:
  categorymappings:
    # https://relay.ygg.gratis/torznab?t=caps
    - {id: 1000, cat: Console, desc: "Console"}
    - {id: 1010, cat: Console/NDS, desc: "Console/NDS"}
    - {id: 1020, cat: Console/PSP, desc: "Console/PS"}
    - {id: 1030, cat: Console/Wii, desc: "Console/Wii"}
    - {id: 1040, cat: Console/XBox, desc: "Console/Xbox"}
    - {id: 1080, cat: Console/PS3, desc: "Console/PS3"}
    - {id: 1180, cat: Console/PS4, desc: "Console/PS4"}
    - {id: 2000, cat: Movies, desc: "Movies"}
    - {id: 2010, cat: Movies/Foreign, desc: "Movies/Foreign"}
    - {id: 2030, cat: Movies/SD, desc: "Movies/SD"}
    - {id: 2040, cat: Movies/HD, desc: "Movies/HD"}
    - {id: 2045, cat: Movies/UHD, desc: "Movies/UHD"}
    - {id: 2050, cat: Movies/3D, desc: "Movies/3D"}
    - {id: 2060, cat: Movies/BluRay, desc: "Movies/BluRay"}
    - {id: 2070, cat: Movies/DVD, desc: "Movies/DVD"}
    - {id: 2080, cat: Movies/WEB-DL, desc: "Movies/WEB-DL"}
    - {id: 3000, cat: Audio, desc: "Audio"}
    - {id: 3010, cat: Audio/MP3, desc: "Audio/MP3"}
    - {id: 3020, cat: Audio/Video, desc: "Audio/Video"}
    - {id: 3030, cat: Audio/Audiobook, desc: "Audio/Audiobook"}
    - {id: 3040, cat: Audio/Lossless, desc: "Audio/Lossless"}
    - {id: 3050, cat: Audio/Other, desc: "Audio/Other"}
    - {id: 4000, cat: PC, desc: "PC"}
    - {id: 4010, cat: PC/0day, desc: "PC/0day"}
    - {id: 4020, cat: PC/ISO, desc: "PC/ISO"}
    - {id: 4030, cat: PC/Mac, desc: "PC/Mac"}
    - {id: 4050, cat: PC/Games, desc: "PC/Games"}
    - {id: 4060, cat: PC/Mobile-iOS, desc: "PC/Mobile-iOS"}
    - {id: 4070, cat: PC/Mobile-Android, desc: "PC/Mobile-Android"}
    - {id: 5000, cat: TV, desc: "TV"}
    - {id: 5010, cat: TV/WEB-DL, desc: "TV/WEB-DL"}
    - {id: 5020, cat: TV/Foreign, desc: "TV/Foreign"}
    - {id: 5030, cat: TV/SD, desc: "TV/SD"}
    - {id: 5040, cat: TV/HD, desc: "TV/HD"}
    - {id: 5045, cat: TV/UHD, desc: "TV/UHD"}
    - {id: 5060, cat: TV/Sport, desc: "TV/Sport"}
    - {id: 5070, cat: TV/Anime, desc: "TV/Anime"}
    - {id: 5080, cat: TV/Documentary, desc: "TV/Documentary"}
    - {id: 6000, cat: XXX, desc: "XXX"}
    - {id: 6010, cat: XXX/DVD, desc: "XXX/DVD"}
    - {id: 6040, cat: XXX/x264, desc: "XXX/x264"}
    - {id: 6070, cat: XXX/Other, desc: "XXX/Other"}
    - {id: 7000, cat: Books, desc: "Books"}
    - {id: 7010, cat: Books/Mags, desc: "Books/Mags"}
    - {id: 7020, cat: Books/EBook, desc: "Books/EBook"}
    - {id: 7030, cat: Books/Comics, desc: "Books/Comics"}
    - {id: 7040, cat: Books/Technical, desc: "Books/Technical"}
    - {id: 8000, cat: Other, desc: "Other"}

  modes:
    search: [q]
    tv-search: [q, season, ep] # despite caps it does not return search for imdbid or tmdbid
    movie-search: [q] # despite caps it does not return search for imdbid or tmdbid
    music-search: [q]
    book-search: [q]
#  allowtvsearchimdb: true
  allowrawsearch: true

settings:
  - name: apiurl
    type: select
    label: select an API URL
    default: u2prelais.eliottb.dev
    options:
      u2prelais.eliottb.dev: u2prelais.eliottb.dev
      relay.ygg.gratis: relay.ygg.gratis
      u2p.anhkagi.net: u2p.anhkagi.net      
  - name: multilang
    type: checkbox
    label: Replace MULTi by another language in release name
    default: false
  - name: multilanguage
    type: select
    label: Replace MULTi by this language
    default: FRENCH
    options:
      FRENCH: FRENCH
      MULTi.FRENCH: MULTi.FRENCH
      ENGLISH: ENGLISH
      MULTi.ENGLISH: MULTi.ENGLISH
      VOSTFR: VOSTFR
      MULTi.VOSTFR: MULTi.VOSTFR
  - name: vostfr
    type: checkbox
    label: Replace VOSTFR and SUBFRENCH with ENGLISH
    default: false

search:
  paths:
    - path: "https://{{ .Config.apiurl }}/torznab"
      response:
        type: xml

  inputs:
    t: "{{ .Query.Type }}"
    q: "{{ .Keywords }}"
    cat: "{{ join .Categories \",\" }}"
#    imdbid: "{{ .Query.IMDBID }}"
#    tmdbid: "{{ .Query.TMDBID }}"
    season: "{{ .Query.Season }}"
    ep: "{{ .Query.Ep }}"
    limit: 100

  rows:
    selector: rss > channel > item
    filters:
      - name: andmatch

  fields:
    category:
      selector: '[name="category"]'
      attribute: value
    title_phase1:
      selector: title
    title_vostfr:
      text: "{{ .Result.title_phase1 }}"
      filters:
        - name: re_replace
          args: ["(?i)\\b(vostfr|subfrench)\\b", "ENGLISH"]
    title_phase2:
      text: "{{ if .Config.vostfr }}{{ .Result.title_vostfr }}{{ else }}{{ .Result.title_phase1 }}{{ end }}"
    title_multilang:
      text: "{{ .Result.title_phase2 }}"
      filters:
        - name: re_replace
          args: ["(?i)\\b(MULTI(?!.*(?:FRENCH|ENGLISH|VOSTFR|VF2|VFF|VFQ|VOQ|VFI|VOF)))\\b", "{{ .Config.multilanguage }}"]
    title:
      text: "{{ if .Config.multilang }}{{ .Result.title_multilang }}{{ else }}{{ .Result.title_phase2 }}{{ end }}"
    details:
      text: "{{ .Config.sitelink }}"
    download:
      selector: enclosure
      attribute: url
    infohash:
      selector: '[name="infohash"]'
      attribute: value
    imdbid:
      selector: description
      filters:
        - name: regexp
          args: imdb\.com\/title\/(tt\d+)
    tmdbid:
      selector: description
      filters:
        - name: regexp
          args: themoviedb\.org\/(?:movie|tv)\/(\d+)
    date:
      # Sun, 18 Jan 2026 04:05:41 +0000
      selector: pubDate
      filters:
        - name: dateparse
          args: "ddd, dd MMM yyyy HH:mm:ss zzz"
    size:
      selector: size
    seeders:
      selector: '[name="seeders"]'
      attribute: value
    leechers:
      selector: '[name="leechers"]'
      attribute: value
    downloadvolumefactor:
      text: 0
      # returns 1 ATM
#      selector: '[name="downloadvolumefactor"]'
#      attribute: value
    uploadvolumefactor:
      selector: '[name="uploadvolumefactor"]'
      attribute: value
# torznab xml
