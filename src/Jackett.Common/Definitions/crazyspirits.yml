#      id: "{{ .DownloadUri.Query.id }}"
#      to: give
#      torrent: "{{ .DownloadUri.Query.id }}"
#  selectors:
#    - selector: a[href^="download.php?id="]
#      attribute: href

search:
  paths:
    # https://www.crazyspirits.com/torrents-search.php?search=&cat=0&incldead=1&freeleech=0&&lang=0
    - path: torrents-search.php
  inputs:
# using multi cat search causes http 500 internal server error
# $raw: "{{ range .Categories }}c{{.}}=1&{{end}}"
    search: "{{ .Keywords }}"
    cat: 0
    # 0 active, 1 incldead, 2 onlydead
    incldead: 1
    # 0 all, 1 nofree, 2 onlyfree
    freeleech: "{{ if .Config.freeleech }}2{{ else }}0{{ end }}"
    # 0 all, 1 not recommended, 2 only recommended
    recommended: 0
    # 0 all, 1 french, 2 english, etc
    lang: 0
    sort: "{{ .Config.sort }}"
    order: "{{ .Config.type }}"
    # imdb search not supported and imdb links not in results.

  rows:
    selector: table.border_table > tbody > tr.t-row

  fields:
    category:
      selector: a[href^="torrents.php?cat="]
      attribute: href
      filters:
        - name: querystring
          args: cat
    title_phase0:
      # title can be abbreviated
      selector: a[href^="torrents-details.php?id="] b
    title_phase1:
      # if available, the youtube link has a full title
      selector: a[href*="youtube.com/"]
      attribute: title
      optional: true
      filters:
        - name: replace
          args: ["-NoTag", ""]
    title_phase2:
      text: "{{ if .Result.title_phase1 }}{{ .Result.title_phase1 }}{{ else }}{{ .Result.title_phase0 }}{{ end }}"
    title_vostfr:
      text: "{{ .Result.title_phase2 }}"
      filters:
        - name: re_replace
          args: ["(?i)\\b(vostfr|subfrench)\\b", "ENGLISH"]
    title_phase3:
      text: "{{ if .Config.vostfr }}{{ .Result.title_vostfr }}{{ else }}{{ .Result.title_phase2 }}{{ end }}"
    title_multilang:
      text: "{{ .Result.title_phase3 }}"
      filters:
        - name: re_replace
          args: ["(?i)\\b(MULTI(?!.*(?:FRENCH|ENGLISH|VOSTFR)))\\b", "{{ .Config.multilanguage }}"]
    title:
      text: "{{ if .Config.multilang }}{{ .Result.title_multilang }}{{ else }}{{ .Result.title_phase3 }}{{ end }}"
    details:
      selector: a[href^="torrents-details.php?id="]
      attribute: href
    download:
      selector: a[href^="torrents-details.php?id="]
      attribute: href
      filters:
        - name: replace
          args: ["torrents-details", "download"]
    poster:
      selector: a[href^="torrents-details.php?id="]
      attribute: data-tippy-content
      filters:
        - name: regexp
          args: poster\"\:\"(.*?)\"
        - name: replace
          args: ["\\", ""]
    grabs:
      selector: a[href^="torrents-details.php?id="]
      attribute: data-tippy-content
      filters:
        - name: regexp
          args: done\"\:(\d+)
    size:
      selector: td:nth-last-child(4)
    seeders:
      selector: td:nth-last-child(3)
    leechers:
      selector: td:nth-last-child(2)
    date:
      text: now
    downloadvolumefactor:
      case:
        img[title="FreeLeech 100% !"]: 0
        "*": 1
    uploadvolumefactor:
      text: 1
    minimumratio:
      text: 1.0
    minimumseedtime:
      # 2 day (as seconds = 2 x 24 x 60 x 60)
      text: 172800
