---
id: crnaberza2fa
name: CrnaBerza2FA
description: "CrnaBerza is a BALKAN Private Torrent Tracker for MOVIES / TV / GENERAL. This indexer uses cookie login for 2FA."
language: sr-SP
type: private
encoding: UTF-8
links:
  - https://www.crnaberza.com/
legacylinks:
  - http://www.crnaberza.com/

caps:
  categorymappings:
    - {id: 65, cat: Movies/3D, desc: "3D Film"}
    - {id: 82, cat: Movies/UHD, desc: "4K video"}
