---
id: order66
name: Order66
description: "Order66 is a Private Torrent Tracker for MOVIES / TV / GENERAL"
language: en-US
type: private
encoding: UTF-8
links:
  - https://executeorder66.info/

caps:
  categorymappings:
    - {id: 47, cat: PC/0day, desc: "APP: WINDOWS/O/S"}
    - {id: 18, cat: PC, desc: "Apps: PC"}
    - {id: 20, cat: PC, desc: "Apps: Linux"}
    - {id: 10, cat: PC/Games, desc: "Games: PC"}
    - {id: 61, cat: Movies/SD, desc: "Movies: Xvid"}
    - {id: 54, cat: Movies/DVD, desc: "Movies: DVD-R"}
    - {id: 55, cat: Movies/BluRay, desc: "Movies: HD/Bluray"}
    - {id: 56, cat: Movies, desc: "Movies: Kids"}
    - {id: 57, cat: Movies/HD, desc: "Movies: MP4"}
    - {id: 58, cat: Movies, desc: "Movies: Packs"}
    - {id: 59, cat: Movies/WEB-DL, desc: "Movies: WEBRip/Web-DL"}
    - {id: 60, cat: Movies/HD, desc: "Movies: x265"}
    - {id: 53, cat: Movies/SD, desc: "Movies: Cam"}
    - {id: 52, cat: Movies/BluRay, desc: "Movies: BD-Rip"}
    - {id: 51, cat: Movies/BluRay, desc: "Movies: BD-R"}
    - {id: 50, cat: Movies/UHD, desc: "Movies: 4K"}
    - {id: 49, cat: Movies/SD, desc: "Movies: 480p"}
    - {id: 48, cat: Movies/BluRay, desc: "Movies: BluRay/AVI/MKV"}
    - {id: 1, cat: Movies/Other, desc: "Movies: R3-En-Code"}
    - {id: 9, cat: Audio, desc: "music: All"}
    - {id: 22, cat: Audio, desc: "Music: MP3/Flac"}
    - {id: 26, cat: Audio, desc: "Music: SiteDJExclusivemix"}
    - {id: 41, cat: TV/HD, desc: "TV: HD"}

  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]
    music-search: [q]

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password
  - name: info_flaresolverr
    type: info_flaresolverr
  - name: freeleech
    type: checkbox
    label: Filter freeleech only
    default: false
  - name: sort
    type: select
    label: Sort requested from site
    default: id
    options:
      id: created
      seeders: seeders
      size: size
      name: title
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc
  - name: info_results
    type: info
    label: Search results
    default: "If you are getting <b>0 results</b> then access the site with your browser and <b>mark as read</b> all PMs."

login:
  path: account-login.php
  method: post
  inputs:
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
  error:
    - selector: div.lp-alert:contains("incorrect")
      message:
        text: "The specified username or password was incorrect."
  test:
    path: index.php
    selector: a[href="account-logout.php"]

search:
  paths:
    # https://executeorder66.info/torrents.php?search=&cat=
    - path: torrents.php
  inputs:
    search: "{{ .Keywords }}"
    cat: 0
    sort: "{{ .Config.sort }}"
    order: "{{ .Config.type }}"

  keywordsfilters:
    # replace spaces between words with percent wildcard
    - name: re_replace
      args: ["\\W+", "%"]

  rows:
    selector: "table.ttbl > tbody > tr:has(a[href^=\"download.php?id=\"]){{ if .Config.freeleech }}:has(span.badge-free){{ else }}{{ end }}"

  fields:
    category:
      selector: a[href^="torrents.php?cat="]
      attribute: href
      filters:
        - name: querystring
          args: cat
    title:
      selector: a[href^="torrents-details.php?id="]
    details:
      selector: a[href^="torrents-details.php?id="]
      attribute: href
    download:
      selector: a[href^="download.php?id="]
      attribute: href
    poster:
      selector: img
      attribute: src
    size:
      selector: td:nth-child(6)
    date:
      # auto adjusted by site account profile
      # 16-06-26<br>09:08
      selector: td:nth-child(8)
      filters:
        - name: dateparse
          args: "dd-MM-yyHH:mm"
    seeders:
      selector: span[class^="num-s"]
    leechers:
      selector: span[class^="num-l"]
    grabs:
      selector: td:nth-child(7)
    downloadvolumefactor:
      case:
        span.badge-free: 0
        "*": 1
    uploadvolumefactor:
      text: 1
    minimumratio:
      text: 0.5
# TorrentTrader v3.0
