    search: [q]
    tv-search: [q]
    movie-search: [q]

download:
  selectors:
    - selector: a.list-group-item.newdawn[href^="magnet:"]
      attribute: href

search:
  paths:
    - path: busca.php
  inputs:
    palavraPesquisa: "{{ .Keywords }}"

  rows:
    selector: "#caixaBusca > a"

  fields:
    year:
      selector: ".flutuaPesquisa > span.letraBusca:nth-of-type(4)"
      optional: true

    title:
      selector: .flutuaPesquisa
      filters:
        - name: re_replace
          args: ["\\n[\\s\\S]*$", ""]             
        - name: re_replace
          args: ["\\s*\\.\\.\\.\\s*$", ""]
        - name: append
          args: " {{ .Result.year }}"

    category:
      selector: ".flutuaPesquisa > span.letraBusca:nth-of-type(2)"

    details:
      attribute: href

    download:
      attribute: href

    poster:
      selector: img
      attribute: src
      optional: true

    date:
      text: now

    size:
      case:
        ".flutuaPesquisa > span.letraBusca:nth-of-type(2):contains(\"Filme\")": "8 GB"
        ".flutuaPesquisa > span.letraBusca:nth-of-type(2):contains(\"Série\")": "1.5 GB"
        ".flutuaPesquisa > span.letraBusca:nth-of-type(2):contains(\"Desenho\")": "500 MB"
        "*": "2 GB"

    seeders:
      text: 1

    leechers:
      text: 0

    downloadvolumefactor:
      text: 0

    uploadvolumefactor:
      text: 1
