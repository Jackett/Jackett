---
id: pandacd
name: PandaCD
description: "PandaCD is a music tracker for Creative Commons and artist-permitted content"
language: en-US
type: public
encoding: UTF-8

links:
  - https://pandacd.io/

caps:
  categorymappings:
    - {id: 3000, cat: Audio, desc: "Audio"}
    - {id: 3010, cat: Audio/MP3, desc: "MP3"}
    - {id: 3040, cat: Audio/Lossless, desc: "Lossless"}

  modes:
    search: [q]
    music-search: [q, artist, album, genre]

settings:
  - name: apikey
    type: text
    label: API Key (optional)
    default: ""

search:
  paths:
    - path: /api/torznab
      response:
        type: xml

  inputs:
    t: "{{ .Query.Type }}"
    q: "{{ .Keywords }}"
    cat: "{{ join .Categories \",\" }}"
    artist: "{{ .Query.Artist }}"
    album: "{{ .Query.Album }}"
    genre: "{{ .Query.Genre }}"
    apikey: "{{ .Config.apikey }}"
    limit: 100

  rows:
    selector: rss > channel > item

  fields:
    category:
      selector: "[name=category]"
      attribute: value
    title:
      selector: title
    details:
      selector: guid
    download:
      selector: enclosure
      attribute: url
    date:
      selector: pubDate
      filters:
        - name: dateparse
          args: "ddd, dd MMM yyyy HH:mm:ss zzz"
    size:
      selector: "[name=size]"
      attribute: value
    seeders:
      selector: "[name=seeders]"
      attribute: value
    leechers:
      selector: "[name=leechers]"
      attribute: value
    grabs:
      selector: "[name=grabs]"
      attribute: value
    infohash:
      selector: "[name=infohash]"
      attribute: value
# torznab xml
